apiVersion: datafold.datafold.com/v1alpha1
kind: DatafoldApplication
metadata:
  name: datafold-deploy
  namespace: datafold
spec:
  global:
    serverName: datafold.example.com
    environment: production
    clusterName: datafold-cluster
    portalUrl: https://portal.datafold.com
    deployment: datafold-production
  # Datadog Monitoring with Customer Dual Shipping
  #
  # This configuration enables dual-shipping of metrics, logs, and/or APM traces
  # to the customer's own Datadog account. The customer gets full visibility into
  # their Datafold resource usage (the four golden signals: latency, traffic,
  # errors, saturation) and can create their own dashboards and alerts.
  #
  # The customer's Datadog API key is injected into the shared secret via
  # customSecrets. The datadog subchart reads it from there.
  monitoring:
    type: datadog
    monitoringApiKey:
      secretName: datafold-operator-secrets
      keyName: monitoringApiKey
    datadog:
      apm: false
      monitorPostgres: true
      npm:
        enabled: true
        dnsstats: true
      clientToken: "your-datadog-client-token"
      applicationId: "your-datadog-application-id"
  # Inject the customer's Datadog API key into the shared Kubernetes secret.
  # The Datadog agent's dual-shipping configuration references this key.
  secrets:
    customSecrets:
      - name: DATAFOLD_CUSTOMER_DD_API_KEY
        value: "<customer-datadog-api-key>"
  # Enable dual-shipping on the datadog subchart.
  # These values are passed to the datadog subchart via the components rawValues.
  components:
    datadog:
      rawValues:
        customerMonitoring:
          enabled: true
          # Customer's Datadog site (datadoghq.com, datadoghq.eu, us3.datadoghq.com, etc.)
          site: "datadoghq.com"
          # Forward metrics, logs, and/or APM traces
          metrics: true
          logs: true
          apm: false

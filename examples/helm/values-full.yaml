global:
  serverName: datafold.example.com
  environment: production
  clusterName: datafold-cluster
  deployment: datafold-production
  vpcCidr: "10.0.0.0/16"
  postgres:
    server: datafold-postgres.example.com
    port: 5432
  redis:
    port: 6379
  clickhouse:
    port: 9000
    database: clickhouse

postgres:
  install: false


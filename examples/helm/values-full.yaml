secrets:
  operator:
    apiKey: "your-api-key"
    portalUrl: "https://portal.datafold.com"
  database:
    encryptionKey: "your-database-encryption-key"
  installMePassword: "your-install-password"
  postgres:
    user: datafold
    database: datafold
    password: "your-postgres-password"
    ro_user: datafold_ro
    ro_password: "your-postgres-ro-password"
    datadog_password: "your-postgres-monitoring-password"
  clickhouse:
    user: default
    password: "your-clickhouse-password"
  redis:
    password: "your-redis-password"
  mail:
    server: email-smtp.us-west-2.amazonaws.com
    defaultSender: noreply@datafold.com
    username: "your-smtp-username"
    password: "your-email-password"
  datadog:
    apiKey: "your-datadog-api-key"
    clientToken: "your-datadog-client-token"
    applicationId: "your-datadog-application-id"
  freshpaint:
    url: "https://api.perfalytics.com/track"
    frontendToken: "your-frontend-token"
    backendToken: "your-backend-token"
    avoToken: "your-avo-token"

config:
  monitoringProvider: datadog

datadog:
  apm: false
  monitorPostgres: true
  npm:
    enabled: true
    dnsstats: true
  clientToken: "your-datadog-client-token"
  applicationId: "your-datadog-application-id"

operator:
  install: true
  replicaCount: 1
  image:
    tag: "1.2.9"
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  serviceAccount:
    name: datafold-operator
    roleArn: "arn:aws:iam::123456789012:role/datafold-operator"

nginx:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"
  ingress:
    deploy: true
    internal: false
    sslCertificate: "arn:aws:acm:us-west-2:123456789012:certificate/your-certificate-id"
    subnets: "subnet-12345678,subnet-87654321"
    secgroups: "sg-12345678,sg-87654321"
  service:
    loadBalancerIps:
      - "10.0.1.100"
      - "10.0.1.101"

dfshell:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  serviceAccount:
    name: datafold-dfshell
    roleArn: "arn:aws:iam::123456789012:role/datafold-dfshell"

server:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-server
    roleArn: "arn:aws:iam::123456789012:role/datafold-server"

worker:
  install: true
  replicaCount: 3
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-worker
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker"
  worker:
    count: 2
    memory: "2000000"

worker2:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-worker2
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker2"

worker3:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-worker3
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker3"

worker-catalog:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker-catalog
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-catalog"

worker-interactive:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-worker-interactive
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-interactive"

worker-singletons:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker-singletons
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-singletons"

worker-lineage:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker-lineage
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-lineage"

worker-temporal:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker-temporal
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-temporal"

worker-compute:
  install: true
  replicaCount: 1
  extraEnv:
    - name: TEMPORAL_TASK_QUEUES
      value: "datadiff,translation"
  resources:
    limits:
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "4Gi"

worker-highmem:
  install: true
  replicaCount: 1
  extraEnv:
    - name: TEMPORAL_TASK_QUEUES
      value: "lineage,catalog"
  resources:
    limits:
      memory: "20Gi"
    requests:
      cpu: "100m"
      memory: "20Gi"

worker-realtime:
  install: true
  replicaCount: 1
  extraEnv:
    - name: TEMPORAL_TASK_QUEUES
      value: "interactive,api"
  resources:
    limits:
      memory: "4Gi"
    requests:
      cpu: "200m"
      memory: "4Gi"

worker-storage:
  install: true
  replicaCount: 1
  extraEnv:
    - name: TEMPORAL_TASK_QUEUES
      value: "localstorage,replication"
  storage:
    enabled: true
    dataSize: "100Gi"
  resources:
    limits:
      memory: "15Gi"
    requests:
      cpu: "100m"
      memory: "15Gi"

worker-storage-high:
  install: true
  replicaCount: 1
  extraEnv:
    - name: TEMPORAL_TASK_QUEUES
      value: "localstorage-large"
  storage:
    enabled: true
    dataSize: "100Gi"
  resources:
    limits:
      memory: "30Gi"
    requests:
      cpu: "100m"
      memory: "30Gi"

worker-monitor:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker-monitor
    roleArn: "arn:aws:iam::123456789012:role/datafold-worker-monitor"
  worker:
    queues: "alerts"
    count: 4
    memory: "2000000"

clickhouse:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "4000m"
      memory: "8Gi"
    requests:
      cpu: "2000m"
      memory: "4Gi"
  config:
    s3_bucket: "datafold-clickhouse-backups"
    s3_region: "us-west-2"
    s3_backup_role: "arn:aws:iam::123456789012:role/datafold-clickhouse-backup"
  storage:
    dataSize: 500
    dataVolumeId: "vol-12345678"
    logSize: 100
    logVolumeId: "vol-87654321"

redis:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  storage:
    dataSize: 100
    dataVolumeId: "vol-11223344"

scheduler:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-scheduler
    roleArn: "arn:aws:iam::123456789012:role/datafold-scheduler"

storage-worker:
  install: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    name: datafold-storage-worker
    roleArn: "arn:aws:iam::123456789012:role/datafold-storage-worker"
  worker:
    tasks: 1
    count: 1
    tasks_ack_late: "true"
  storage:
    dataSize: 200

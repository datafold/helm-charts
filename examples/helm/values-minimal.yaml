global:
  serverName: datafold.example.com
  environment: development
  clusterName: datafold-cluster
  deployment: datafold-minimal
  vpcCidr: "10.0.0.0/16"
  postgres:
    server: datafold-postgres.example.com
    port: 5432
  redis:
    port: 6379
  clickhouse:
    port: 9000
    database: clickhouse

postgres:
  install: false

secrets:
  operator:
    apiKey: "your-api-key"
    portalUrl: "https://portal.datafold.com"
  database:
    encryptionKey: "your-database-encryption-key"
  installMePassword: "your-install-password"
  postgres:
    user: datafold
    database: datafold
    password: "your-postgres-password"
  clickhouse:
    user: default
    password: "your-clickhouse-password"
  redis:
    password: "your-redis-password"
  mail:
    server: email-smtp.us-west-2.amazonaws.com
    defaultSender: noreply@datafold.com
    username: "your-smtp-username"
    password: "your-email-password"

nginx:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  ingress:
    deploy: true
    internal: false
    subnets: "subnet-12345678,subnet-87654321"
    secgroups: "sg-12345678,sg-87654321"
  service:
    loadBalancerIps:
      - "10.0.1.100"

server:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-server
    roleArn: "arn:aws:iam::123456789012:role/datafold-user"

worker:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-worker
    roleArn: "arn:aws:iam::123456789012:role/datafold-user"

clickhouse:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "2000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
  config:
    s3_bucket: "datafold-clickhouse-backups"
    s3_region: "us-west-2"
    s3_backup_role: "arn:aws:iam::123456789012:role/datafold-clickhouse-backup"
  storage:
    dataSize: 100
    logSize: 20

redis:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  storage:
    dataSize: 20

scheduler:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  serviceAccount:
    name: datafold-scheduler
    roleArn: "arn:aws:iam::123456789012:role/datafold-user"

operator:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "250m"
      memory: "512Mi"
    requests:
      cpu: "125m"
      memory: "256Mi"
  serviceAccount:
    name: datafold-operator
    roleArn: "arn:aws:iam::123456789012:role/datafold-user"

storage-worker:
  install: true
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"
  serviceAccount:
    name: datafold-storage-worker
    roleArn: "arn:aws:iam::123456789012:role/datafold-user"
  storage:
    dataSize: 50

worker2:
  install: false
worker3:
  install: false
worker-catalog:
  install: false
worker-interactive:
  install: false
worker-singletons:
  install: false
worker-lineage:
  install: false
worker-temporal:
  install: false
worker-compute:
  install: false
worker-highmem:
  install: false
worker-realtime:
  install: false
worker-storage:
  install: false
worker-storage-high:
  install: false
worker-monitor:
  install: false
dfshell:
  install: false
dma:
  install: false
dma2:
  install: false
dma3:
  install: false

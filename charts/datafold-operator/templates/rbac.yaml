{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "datafold-operator.fullname" . }}-role
  labels:
    {{- include "datafold-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - datafold.datafold.com
  resources:
  - datafoldapplications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - datafold.datafold.com
  resources:
  - datafoldapplications/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - datafold.datafold.com
  resources:
  - datafoldapplications/finalizers
  verbs:
  - update
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - patch
  - update
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
{{- if .Values.metrics.enabled }}
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- end }}

{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "datafold-operator.fullname" . }}-rolebinding
  labels:
    {{- include "datafold-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "datafold-operator.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "datafold-operator.serviceAccountName" . }}
  namespace: {{ include "datafold-operator.namespace" . }}
{{- end }}

{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "datafold-operator.fullname" . }}-metrics-reader
  namespace: {{ include "datafold-operator.namespace" . }}
  labels:
    {{- include "datafold-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
{{- end }}

{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "datafold-operator.fullname" . }}-metrics-auth-reader
  namespace: {{ include "datafold-operator.namespace" . }}
  labels:
    {{- include "datafold-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "datafold-operator.fullname" . }}-metrics-reader
subjects:
- kind: ServiceAccount
  name: {{ include "datafold-operator.serviceAccountName" . }}
  namespace: {{ include "datafold-operator.namespace" . }}
{{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1

# Default values for datafold-manager
# This is a YAML-formatted file.

# When true (default), install cluster-wide resources: CRDs and ClusterRole/ClusterRoleBinding.
# Set to false when deploying the manager in an additional namespace where another release
# already owns the CRDs and cluster RBAC, to avoid conflicts.
# When false, set existingClusterRoleName to the ClusterRole name from the primary release
# (e.g. "<primary-release-name>-role") so this release creates only a ClusterRoleBinding
# granting the same permissions to this namespace's ServiceAccount.
installClusterResources: true

# When installClusterResources is false, name of the existing ClusterRole to bind to
# (from the primary datafold-manager release). Example: "datafold-manager-role".
existingClusterRoleName: "datafold-manager-role"

# Operator configuration
operator:
  # Operator image configuration
  image:
    repository: us-docker.pkg.dev/datadiff-mm/datafold/datafold-operator
    tag: "1.1.69"
    pullPolicy: Always

  # Operator deployment configuration
  replicas: 1

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 400Mi
    requests:
      cpu: 10m
      memory: 400Mi

  # Operator arguments
  args:
    - --health-probe-bind-address=:8081

  # Security context
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Health checks
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

# Namespace configuration
namespace:
  create: false
  name: "datafold-apps"
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: datafold-manager

# Service account configuration
serviceAccount:
  create: true
  name: "controller-manager"
  annotations: {}

# RBAC configuration
rbac:
  create: true
  # Create cluster roles and bindings
  clusterRole:
    create: true
  clusterRoleBinding:
    create: true
  # Namespace Role in the Temporal namespace for Datadog Temporal Role/RoleBinding (not ClusterRole).
  # Only rendered when installClusterResources is true (same as cluster CRDs / ClusterRole).
  # secretResourceNames: required so the manager can create Roles that grant secret access (K8s RBAC escalation).
  datadogTemporalRBAC:
    # Opt-in: set true when deploying the Datadog Temporal Role/RoleBinding via this chart.
    enabled: false
    namespace: temporal
    resourceNames:
      - datafold-datadog-temporal-secrets
    secretResourceNames:
      - datadog.temporal-database.credentials.postgresql.acid.zalan.do

# CRD configuration
crds:
  install: true

# Metrics configuration
metrics:
  enabled: true
  service:
    create: true
    port: 8443
    targetPort: 8443

# Image pull secrets
imagePullSecrets:
  - name: datafold-docker-secret

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Additional environment variables
env: []

# Additional volume mounts
volumeMounts: []

# Additional volumes
volumes: []

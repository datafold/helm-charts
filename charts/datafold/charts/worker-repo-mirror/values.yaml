replicaCount: 1

# OnDelete decouples the mirror from the app deploy cadence: an image-tag bump
# does NOT roll this pod, so it keeps its warm /repos PVC and keeps
# incremental-fetching across every app deploy. Cycle it deliberately (delete
# the pod) only when the mirror worker code itself changes. RollingUpdate (the
# k8s default) would bounce the single replica on every deploy — opening a
# `no_mirror` gap for consumers and SIGKILL-ing in-flight fetches.
updateStrategy:
  type: OnDelete

image:
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: datafold-docker-secret

nameOverride: ""
fullnameOverride: ""

terminationGracePeriodSeconds: "30"

command:
  - "repo_mirror_worker"

serviceAccount:
  create: false
  automount: true
  annotations: {}
  roleArn: ""
  name: "worker"

podAnnotations: {}
podLabels: {}

chartLabels: {}
chartAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false

storage:
  dataSize: "32Gi"
  # Empty falls back to global.temporal.storageClassName then to the
  # chart default (see _helpers.tpl).
  storageClass: ""
  mountPath: "/repos"

resources:
  limits:
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 2Gi

temporal:
  taskQueues: "repomirror"
  maxConcurrency: "10"
  workerPoolType: "thread"
  # Must be ≤ terminationGracePeriodSeconds.
  gracefulShutdownTimeout: "20"

service:
  type: ClusterIP
  name: "repo-mirror"
  port: 9418

networkPolicy:
  enabled: true

metrics:
  enabled: true
  port: 9090

extraEnv: []
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
initContainers: []

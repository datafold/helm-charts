replicaCount: 0
image:
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: datafold-docker-secret
nameOverride: ""
fullnameOverride: ""
terminationGracePeriodSeconds: "30"

command:
  - "./manage.py"
  - "temporal"
  - "start-worker"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  roleArn: ""
  name: ""

podAnnotations: {}
podLabels: {}

chartLabels: {}
chartAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

storage:
  enabled: false
  dataSize: 300Gi

securityContext:
  allowPrivilegeEscalation: False

resources:
  limits:
    memory: 1000Mi
  requests:
    cpu: 100m
    memory: 1000Mi

temporal:
  # taskQueues controls which Temporal task queues this worker polls.
  # Comma-separated list or the special value "all".
  taskQueues: "none"
  # maxConcurrency sets TEMPORAL_MAX_CONCURRENCY — the number of concurrent activity/workflow tasks.
  maxConcurrency: "5"
  # workerPoolType sets DATAFOLD_WORKER_POOL_TYPE. Leave empty for the default pool type.
  workerPoolType: "thread"

keda:
  enabled: false
  minReplicas: 0
  maxReplicas: 10
  pollingInterval: 30
  cooldownPeriod: 300
  activationTargetQueueSize: "0"
  scaleDown:
    stabilizationWindowSeconds: 300
  # authRef is the name of a pre-existing TriggerAuthentication object.
  # Leave empty for unauthenticated access to the Temporal endpoint.
  authRef: ""

metrics:
  # Exposes a Prometheus metrics port and adds Datadog autodiscovery annotations
  # so the DD Agent scrapes temporal_ SDK metrics. Disable only if you need to
  # suppress metrics for a specific deployment.
  enabled: true
  port: 9090

health:
  # Enables the HTTP liveness probe endpoint (TEMPORAL_HEALTH_PORT).
  # When the activity executor becomes broken the endpoint returns 503, which
  # triggers K8s to send SIGTERM and schedule a replacement pod immediately.
  # The old pod continues draining within terminationGracePeriodSeconds so
  # in-flight work on healthy threads can still complete.
  enabled: true
  port: 8091
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 4
    timeoutSeconds: 5

extraEnv: []

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

initContainers: []

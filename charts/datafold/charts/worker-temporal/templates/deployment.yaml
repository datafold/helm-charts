apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worker-temporal.fullname" . }}
  labels:
    {{- include "worker-temporal.labels" . | nindent 4 }}
    {{- with .Values.chartLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.chartAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "worker-temporal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "worker-temporal.datafold.annotations" . | nindent 8 }}
        {{- include "worker-temporal.datadog.annotations" . | nindent 8 }}
        {{- if .Values.metrics.enabled }}
        # Keep Datadog custom-metric cardinality down for the Temporal SDK metrics.
        # (Validated on the staging cluster — see notes per item.)
        #
        # 1. include_labels — allowlist of the only scraped SDK labels that any
        #    Datadog monitor or the temporal dashboard actually queries: task_queue,
        #    workflow_type, activity_type, plus worker_type + poller_type (ENG-4140:
        #    the operator dashboard's worker-capacity section splits slots by
        #    worker_type and pollers by poller_type; without these, prod series land
        #    as worker_type:N/A / poller_type:N/A — only dev stacks that scrape all
        #    labels populated them). Both are low-cardinality (worker_type has 3
        #    values: activity/workflow/localactivity; poller_type 2), so the added
        #    custom-metric volume is small. Every other scraped label (operation,
        #    namespace, service_name, version, ...) is dropped.
        # 2. tag_by_endpoint=false — drops the `endpoint` tag
        #    (http://<pod-ip>:9090/metrics), which is effectively per-pod cardinality.
        # 3. exclude_metrics_by_labels — drops sticky task-queue samples at scrape
        #    time. Every workflow worker creates a per-pod sticky queue
        #    (task_queue="sticky.<pod>-worker-pod") that explodes task_queue
        #    cardinality. It regex-matches the scraped label VALUE and drops the
        #    whole sample; include_labels keeps the task_queue KEY but not its
        #    values, so this value-level drop is still required. The real queues
        #    (io, highmem, storage, storagehigh, monitors, ...) stay queryable.
        #
        # NOTE: ignore_tags does NOT work here — it only filters Autodiscovery/Tagger
        # tags and the `tags` option, never labels scraped from the /metrics endpoint.
        # Kubernetes tagger tags are trimmed separately at the agent via
        # DD_CHECKS_TAG_CARDINALITY=low (DatadogAgent CR in the datadog chart,
        # configuration.checksTagCardinality), which drops the higher-cardinality
        # orchestrator tags (pod_name, kube_replica_set, ...).
        #
        # The host/cloud/node tag family (host, instance-id, availability-zone, aws_*,
        # region, instance-type, image*, zone, kube_node, ...) is NOT removed by this
        # config. `empty_default_hostname: true` would drop it, but it also strips the
        # env/deployment DD_TAGS host tags (they piggyback on the host), so it must be
        # paired with a check-level `tags: ["env:...","deployment:..."]` re-injection.
        # Left off for now; add both together later, or use Metrics-without-Limits.
        ad.datadoghq.com/{{ .Chart.Name }}.checks: |
          {
            "openmetrics": {
              "instances": [{
                "openmetrics_endpoint": "http://%%host%%:{{ .Values.metrics.port }}/metrics",
                "namespace": "temporal_worker",
                "metrics": ["temporal_.*"],
                "tag_by_endpoint": false,
                "include_labels": [
                  "task_queue",
                  "workflow_type",
                  "activity_type",
                  "worker_type",
                  "poller_type"
                ],
                "collect_histogram_buckets": true,
                "histogram_buckets_as_distributions": true,
                "exclude_metrics_by_labels": {
                  "task_queue": ["^sticky\\."]
                }
              }]
            }
          }
        {{- end }}
      labels:
        {{- include "worker-temporal.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "worker-temporal.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.shellRepository }}/{{ .Values.global.datafoldImage }}:{{ .Values.global.datafoldVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml $.Values.command | nindent 10 }}
          envFrom:
            - configMapRef:
                name: {{ include "datafold.configmap" . }}
            {{- if or .Values.global.temporal.encryption.keys .Values.global.temporal.encryption.externalSecretName }}
            - secretRef:
                name: {{ include "datafold.temporal.encryptionSecretName" . }}
            {{- end }}
          env:
            {{ include "datafold.env" . | nindent 12 }}
            - name: DATAFOLD_DATADOG_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "datafold.secrets" . }}
                  key: DATAFOLD_DATADOG_CLIENT_TOKEN
            - name: DATAFOLD_DATADOG_APPLICATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "datafold.secrets" . }}
                  key: DATAFOLD_DATADOG_APPLICATION_ID
            {{- if .Values.temporal.taskQueues }}
            - name: TEMPORAL_TASK_QUEUES
              value: {{ .Values.temporal.taskQueues | quote }}
            {{- end }}
            {{- if .Values.temporal.maxConcurrency }}
            - name: TEMPORAL_MAX_CONCURRENCY
              value: {{ .Values.temporal.maxConcurrency | quote }}
            {{- end }}
            {{- if .Values.temporal.workerPoolType }}
            - name: DATAFOLD_WORKER_POOL_TYPE
              value: {{ .Values.temporal.workerPoolType | quote }}
            {{- end }}
            {{- if .Values.temporal.gracefulShutdownTimeout }}
            - name: TEMPORAL_GRACEFUL_SHUTDOWN_TIMEOUT
              value: {{ .Values.temporal.gracefulShutdownTimeout | quote }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: TEMPORAL_METRICS_BIND_ADDRESS
              value: "0.0.0.0:{{ .Values.metrics.port }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.storage.enabled .Values.volumeMounts .Values.global.temporal.encryption.customCodec.configMapName }}
          volumeMounts:
            {{- include "worker-temporal.volume.mounts" . | nindent 12 }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.global.temporal.encryption.customCodec.configMapName }}
            - name: datafold-plugins
              mountPath: /datafold/plugins
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.storage.enabled .Values.volumes .Values.global.temporal.encryption.customCodec.configMapName }}
      volumes:
        {{- include "worker-temporal.volumes" . | nindent 8 }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.global.temporal.encryption.customCodec.configMapName }}
        - name: datafold-plugins
          configMap:
            name: {{ .Values.global.temporal.encryption.customCodec.configMapName }}
            items:
              - key: {{ .Values.global.temporal.encryption.customCodec.fileName }}
                path: {{ .Values.global.temporal.encryption.customCodec.fileName }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

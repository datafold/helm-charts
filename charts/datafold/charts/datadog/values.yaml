replicaCount: 1

image:
  repository: datadog/datadog
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP

resources: {}

autoscaling:
  enabled: false

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

configuration:
  logLevel: "INFO"
  logCollection:
    enabled: "true"
    containerCollectAll: "true"
  liveProcessCollection: "true"
  liveContainerCollection: "true"
  processDiscovery: "true"
  oomKill: "true"
  orchestratorExplorer: "true"
  apm: "false"
  dogstatsd:
    enabled: "true"
    hostPortConfig: "true"
    tagCardinality: "low"
  # Tag cardinality for Autodiscovery/integration checks (DD_CHECKS_TAG_CARDINALITY).
  # "low" trims higher-cardinality orchestrator tags (e.g. pod_name, kube_replica_set)
  # that the tagger would otherwise attach to scraped metrics such as temporal_worker.*.
  # dogstatsd.tagCardinality above only governs DogStatsD metrics, so checks are set here.
  checksTagCardinality: "low"
  monitorPostgres: false
  monitorKeda: false
  monitorTemporal: false
  clusterChecks: true
  npm:
    enabled: "false"
    dnsstats: "false"

# Extra Kubernetes namespaces to include for container log and metric collection
# (in addition to the release namespace, temporal, and dmadocs). Set via DatafoldApplication
# monitoring.datadog.containerIncludeExtraNamespaces (e.g. ["arc-runners", "arc-system"]).
containerIncludeExtraNamespaces: []

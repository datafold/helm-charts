replicaCount: 1

image:
  repository: datadog/datadog
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP

resources: {}

autoscaling:
  enabled: false

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

configuration:
  logLevel: "INFO"
  logCollection:
    enabled: "true"
    containerCollectAll: "true"
  liveProcessCollection: "true"
  liveContainerCollection: "true"
  processDiscovery: "true"
  oomKill: "true"
  orchestratorExplorer: "true"
  apm: "false"
  dogstatsd:
    enabled: "true"
    hostPortConfig: "true"
    tagCardinality: "low"
  monitorPostgres: false
  clusterChecks: true
  npm:
    enabled: "false"
    dnsstats: "false"

# Extra Kubernetes namespaces to include for container log and metric collection
# (in addition to the release namespace, temporal, and dmadocs). Set via DatafoldApplication
# monitoring.datadog.containerIncludeExtraNamespaces (e.g. ["arc-runners", "arc-system"]).
containerIncludeExtraNamespaces: []

# Customer monitoring is configured via global.datadog.customerMonitoring in the
# parent chart values. It dual-ships metrics, logs, and/or APM traces to the
# customer's own Datadog account. See docs/customer-resource-monitoring.md.

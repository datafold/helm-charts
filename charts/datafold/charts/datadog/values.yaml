replicaCount: 1

image:
  repository: datadog/datadog
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP

resources: {}

autoscaling:
  enabled: false

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

configuration:
  logLevel: "INFO"
  logCollection:
    enabled: "true"
    containerCollectAll: "true"
  liveProcessCollection: "true"
  liveContainerCollection: "true"
  processDiscovery: "true"
  oomKill: "true"
  orchestratorExplorer: "true"
  apm: "false"
  dogstatsd:
    enabled: "true"
    hostPortConfig: "true"
    tagCardinality: "low"
  monitorPostgres: false
  clusterChecks: true
  npm:
    enabled: "false"
    dnsstats: "false"

# Extra Kubernetes namespaces to include for container log and metric collection
# (in addition to the release namespace, temporal, and dmadocs). Set via DatafoldApplication
# monitoring.datadog.containerIncludeExtraNamespaces (e.g. ["arc-runners", "arc-system"]).
containerIncludeExtraNamespaces: []

# Customer monitoring: dual-ship metrics, logs, and/or APM traces to the customer's
# own Datadog account so they have visibility into their Datafold resource usage.
# The customer's API key is read from the main secrets (DATAFOLD_CUSTOMER_DD_API_KEY).
customerMonitoring:
  enabled: false
  # Datadog site for the customer's account (e.g. datadoghq.com, datadoghq.eu,
  # us3.datadoghq.com, us5.datadoghq.com, ap1.datadoghq.com, ddog-gov.com)
  site: "datadoghq.com"
  # Which signal types to forward to the customer's Datadog account
  metrics: true
  logs: true
  apm: false

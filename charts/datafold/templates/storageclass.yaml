{{- if not .Values.global.secondaryDeployment }}
{{- if (eq .Values.global.cloudProvider "aws") }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: "sc-datafold-aws"
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "kubernetes.io/aws-ebs"
reclaimPolicy: "Retain"
parameters:
  encrypted: "true"
  fsType: ext4
  type: {{ include "datafold.storageClassParameterType" . | quote }}
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- if (eq .Values.global.cloudProvider "gcp") }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: "sc-datafold-aws"
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "kubernetes.io/gce-pd"
reclaimPolicy: "Retain"
parameters:
  fsType: ext4
  type: {{ include "datafold.storageClassParameterType" . | quote }}
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- if (eq .Values.global.cloudProvider "azure") }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: "sc-datafold-aws"
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "disk.csi.azure.com"
reclaimPolicy: "Retain"
parameters:
  fsType: ext4
  skuname: {{ include "datafold.storageClassParameterType" . | quote }}
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- $gt := .Values.global.temporal | default dict }}
{{- $createTemporalSC := true }}
{{- if hasKey $gt "createStorageClass" }}
{{- $createTemporalSC = $gt.createStorageClass }}
{{- end }}
{{- if and $createTemporalSC (eq .Values.global.cloudProvider "aws") }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.global.temporal.storageClassName | quote }}
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "kubernetes.io/aws-ebs"
reclaimPolicy: "Delete"
parameters:
  encrypted: "true"
  fsType: "ext4"
  type: {{ include "datafold.temporalStorageClassParameterType" . | quote }}
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- if and $createTemporalSC (eq .Values.global.cloudProvider "gcp") }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.global.temporal.storageClassName | quote }}
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "kubernetes.io/gce-pd"
reclaimPolicy: "Delete"
parameters:
  type: {{ include "datafold.temporalStorageClassParameterType" . | quote }}
  fsType: "ext4"
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- if and $createTemporalSC (eq .Values.global.cloudProvider "azure") }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.global.temporal.storageClassName | quote }}
  {{- with .Values.toplevel.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.toplevel.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
provisioner: "disk.csi.azure.com"
reclaimPolicy: "Delete"
parameters:
  skuname: {{ include "datafold.temporalStorageClassParameterType" . | quote }}
  fsType: "ext4"
allowVolumeExpansion: true
volumeBindingMode: "WaitForFirstConsumer"
{{- end }}
{{- end }}
